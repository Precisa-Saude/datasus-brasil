name: refresh

# Republica os artefatos do site (parquet-opt + manifest) sempre que
# datasus-parquet publicou raw novo no S3 — agrega o que falta, gera
# manifesto, sobe e invalida CloudFront.
#
# Cadência: segunda-feira 08:00 UTC (1h após o cron de refresh do
# datasus-parquet, dando margem para o S3 sync terminar).
# Idempotente: pnpm aggregate pula partições já agregadas, mas faz um
# HEAD no raw remoto antes de pular — se o `Last-Modified` for mais
# novo que o agregado local (DATASUS reescreveu o mês historicamente),
# re-agrega só essa partição. `forceReaggregate=true` ignora o cache
# por completo, útil após bump do SDK.
#
# Secrets necessários (configurar via Settings → Secrets → Actions):
#   AWS_ROLE_ARN                — IAM role com S3 (read+write em sia-pa/,
#                                 parquet-opt/, manifest/, geo/) e CloudFront
#                                 (CreateInvalidation no distribution alvo)
#   S3_BUCKET                   — nome do bucket S3 (sa-east-1)
#   CLOUDFRONT_DISTRIBUTION_ID  — opcional; sem ele, cache só expira via TTL

on:
  schedule:
    - cron: '0 8 * * 1'
  workflow_dispatch:
    inputs:
      forceReaggregate:
        description: 'Força reagregação (ignora cache local) — útil após bump de SDK'
        type: boolean
        default: false

permissions:
  contents: read
  id-token: write # OIDC para assumir AWS_ROLE_ARN

concurrency:
  group: refresh
  cancel-in-progress: false

jobs:
  refresh:
    runs-on: ubuntu-latest
    timeout-minutes: 480
    env:
      AWS_REGION: sa-east-1
      BUCKET: ${{ secrets.S3_BUCKET }}
      DIST_ID: ${{ secrets.CLOUDFRONT_DISTRIBUTION_ID }}
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1

      - uses: pnpm/action-setup@fc06bc1257f339d1d5d8b3a19a8cae5388b55320 # v5.0.0

      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4.4.0
        with:
          node-version: 22
          cache: pnpm

      - name: Install deps
        run: pnpm install --frozen-lockfile

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@7474bc4690e29a8392af63c5b98e7449536d5c3a # v4.3.1
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}
          # Aggregate força roda ~90min; default de 1h fazia STS token expirar
          # mid-run e DuckDB httpfs ficava com creds inválidas → HTTP 400 em
          # massa (run 26052987721 falhou em 62min por isso). Role
          # MaxSessionDuration foi bumped pra 10800s; pedimos 10800 aqui.
          role-duration-seconds: 10800

      # Cache parquet agregado entre runs: aggregate é idempotente — partição
      # já materializada em build/parquet/ é skipada. Sem cache, runner
      # ephemeral começa do zero toda execução. Com cache, retry após falha
      # transiente (token, CloudFront, network) recupera quase tudo. Key
      # versionada por commit do script + SDK pra invalidar quando lógica
      # de agregação muda (schema, mapping LOINC).
      - name: Cache build/parquet
        uses: actions/cache@5a3ec84eff668545956fd18022155c47e93e2684 # v4.2.3
        with:
          path: site/build/parquet
          key: parquet-agg-v2-${{ hashFiles('site/scripts/aggregate-sia-parquet.ts', 'pnpm-lock.yaml') }}
          restore-keys: |
            parquet-agg-v2-

      - name: Aggregate (idempotente — pula partições já agregadas)
        run: |
          if [ "${{ inputs.forceReaggregate }}" = "true" ]; then
            pnpm -F @datasus-viz/site aggregate -- --force
          else
            pnpm -F @datasus-viz/site aggregate
          fi

      - name: Consolidate
        run: pnpm -F @datasus-viz/site build:consolidate

      - name: Build manifest
        run: pnpm -F @datasus-viz/site build:parquet-index

      - name: Detecta diff vs S3 atual
        id: diff
        run: |
          # Compara o manifest novo com o que está em S3. Se idêntico, não
          # republica — economiza CloudFront invalidation e bytes de S3.
          REMOTE=$(aws s3 cp "s3://$BUCKET/manifest/index.json" - 2>/dev/null || echo '{}')
          LOCAL=$(cat site/build/manifest/index.json)
          # Compara campos que importam. Inclui parquetOptVersion porque ele
          # endereça o prefixo do bucket — version novo = parquets em
          # `parquet-opt/<v>/` ainda não existem no S3, precisa subir mesmo
          # com data inalterada. geradoEm fica de fora (timestamp puro, sem
          # impacto em URL).
          REMOTE_KEY=$(echo "$REMOTE" | jq -c '{years, availableUFs, competencias, biomarkers, parquetOptVersion}' 2>/dev/null || echo '{}')
          LOCAL_KEY=$(echo "$LOCAL" | jq -c '{years, availableUFs, competencias, biomarkers, parquetOptVersion}')
          if [ "$REMOTE_KEY" = "$LOCAL_KEY" ]; then
            echo "changed=false" >> "$GITHUB_OUTPUT"
            echo "Sem mudanças no manifesto — pulando upload + invalidation."
          else
            echo "changed=true" >> "$GITHUB_OUTPUT"
            echo "Manifesto mudou — verificando se não é regressão."
          fi

      # Guard contra regressão: aborta se cobertura do manifest novo for
      # MENOR que a publicada. Postmortem 2026-05-18: aggregate produziu
      # silenciosamente 1 ano × 12 UFs após 403s do CloudFront em 2009+;
      # passou no diff (era "diferente"), foi publicado, viz quebrou.
      # Aqui pegamos antes do upload.
      - name: Guard contra regressão de cobertura
        if: steps.diff.outputs.changed == 'true'
        run: |
          REMOTE=$(aws s3 cp "s3://$BUCKET/manifest/index.json" - 2>/dev/null || echo '{}')
          LOCAL=$(cat site/build/manifest/index.json)
          R_YEARS=$(echo "$REMOTE" | jq '(.years // []) | length')
          R_UFS=$(echo "$REMOTE" | jq '(.availableUFs // []) | length')
          R_COMPS=$(echo "$REMOTE" | jq '(.competencias // []) | length')
          L_YEARS=$(echo "$LOCAL"  | jq '(.years // []) | length')
          L_UFS=$(echo "$LOCAL"  | jq '(.availableUFs // []) | length')
          L_COMPS=$(echo "$LOCAL"  | jq '(.competencias // []) | length')
          echo "remote: years=$R_YEARS ufs=$R_UFS comps=$R_COMPS"
          echo "local:  years=$L_YEARS ufs=$L_UFS comps=$L_COMPS"
          if [ "$L_YEARS" -lt "$R_YEARS" ] || [ "$L_UFS" -lt "$R_UFS" ] || [ "$L_COMPS" -lt "$R_COMPS" ]; then
            echo "::error::Manifesto novo regride cobertura — abortando upload. Investigue logs do aggregate."
            exit 1
          fi

      # Re-issue STS credentials antes do Upload. O Aggregate pode rodar
      # >1h (ex.: run 25239782213 levou 1h47m), e o token assumido no
      # início do job tem TTL default de 1h — Upload falhava com
      # ExpiredToken. Re-call do configure-aws-credentials renova.
      - name: Re-configure AWS credentials (refresh token before upload)
        if: steps.diff.outputs.changed == 'true'
        uses: aws-actions/configure-aws-credentials@7474bc4690e29a8392af63c5b98e7449536d5c3a # v4.3.1
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Upload (parquet-opt + manifest + geo)
        if: steps.diff.outputs.changed == 'true'
        run: pnpm -F @datasus-viz/site upload:aws

      - name: Invalidate CloudFront
        if: steps.diff.outputs.changed == 'true' && env.DIST_ID != ''
        run: |
          aws cloudfront create-invalidation \
            --distribution-id "$DIST_ID" \
            --paths '/parquet-opt/*' '/manifest/index.json'

      - name: Resumo
        if: always()
        run: |
          echo "## Refresh — $(date -u +%Y-%m-%dT%H:%M:%SZ)" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          if [ -f site/build/manifest/index.json ]; then
            YEARS=$(jq -r '.years | join(", ")' site/build/manifest/index.json)
            COMPS=$(jq -r '.competencias | length' site/build/manifest/index.json)
            UFS=$(jq -r '.availableUFs | length' site/build/manifest/index.json)
            echo "- Anos: $YEARS" >> "$GITHUB_STEP_SUMMARY"
            echo "- Competências: $COMPS" >> "$GITHUB_STEP_SUMMARY"
            echo "- UFs cobertas: $UFS / 27" >> "$GITHUB_STEP_SUMMARY"
            echo "- Mudou desde último run: \`${{ steps.diff.outputs.changed }}\`" >> "$GITHUB_STEP_SUMMARY"
          else
            echo "Manifesto não gerado." >> "$GITHUB_STEP_SUMMARY"
          fi
